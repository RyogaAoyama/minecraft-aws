AWSTemplateFormatVersion: "2010-09-09"
Description: minecraft instance (LaunchTemplate / spot AutoScalingGroup)

###############################
# パラメーター
###############################
Parameters:
  Env:
    Type: String
    Description: 環境種別
  ProductName:
    Type: String
    Description: プロダクト名
  RootVolumeSize:
    Type: Number
    Default: 8
    Description: ルートEBS(gp3)サイズ(GiB)。AMIスナップショット(8GiB)と同値の最小構成。ワールド/サーバー資産はNVMe instance storeに置くため拡張不要。
  AwsRegion:
    Type: String
    Default: ap-northeast-1
    Description: 稼働リージョン
  PrebakedAmiId:
    # img スタックの Image Builder が SsmParameterConfigurations で書き込む
    # /minecraft/prd/prebaked-ami-id を CFn deploy 時に解決する。
    # ImportValue を使うと AMI 再ベイクで Export 値が変わるたびに
    # 「Cannot update export ... as it is in use」で詰まるため、SSM 経由とする。
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /minecraft/prd/prebaked-ami-id
    Description: Prebaked AMI ID (resolved from SSM at deploy time)

###############################
# リソース
###############################
Resources:
  ###############################
  # LaunchTemplate
  ###############################
  ### McLaunchTemplate ###
  McLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${ProductName}-lt-${Env}
      LaunchTemplateData:
        # AMI は img スタックの EC2 Image Builder が SSM Parameter
        # /minecraft/prd/prebaked-ami-id に書き込む値を CFn deploy 時に解決して使う。
        ImageId: !Ref PrebakedAmiId
        IamInstanceProfile:
          Arn:
            Fn::ImportValue: !Sub ${ProductName}-ec2-instance-profile-arn
        SecurityGroupIds:
          - Fn::ImportValue: !Sub ${ProductName}-mc-sg-id
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSize
              VolumeType: gp3
              DeleteOnTermination: true
              Encrypted: true
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 1
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${ProductName}-server-${Env}
              - Key: ProductName
                Value: !Ref ProductName
              - Key: Env
                Value: !Ref Env
        UserData:
          Fn::Base64: |
            #!/bin/bash
            set -euo pipefail

            # 起動時間測定ログ（CWAgent が /minecraft/startup-timing に転送する）。
            # /etc/minecraft.env / /root/.aws/config / /opt/minecraft/bootstrap/ はすべて AMI に焼き込み済み。
            TIMING_LOG=/var/log/minecraft-startup-timing.log
            log_phase() { echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) phase=$1" >> "$TIMING_LOG"; }
            log_phase userdata-start

            # AMI バージョン不整合（bootstrap 未焼き込み）の早期検知用ガード。
            if [ ! -f /opt/minecraft/bootstrap/install.sh ]; then
              echo "[minecraft-userdata] FATAL: /opt/minecraft/bootstrap/install.sh not found in AMI" | tee -a /var/log/minecraft-userdata.log >&2
              exit 1
            fi

            # AMI 焼き込み後にリポジトリ側の bootstrap が更新されている可能性があるため、
            # 起動時に S3 から最新を取り込み直す（数十KB / 1-2秒程度のオーバーヘッド）。
            # これにより install.sh / spot-watch.sh 等の更新が AMI 再ベイクなしで反映される。
            # /etc/minecraft.env を source して WORLD_BUCKET / AWS_REGION を解決する。
            # shellcheck source=/dev/null
            source /etc/minecraft.env
            aws s3 sync "s3://${WORLD_BUCKET}/bootstrap/" /opt/minecraft/bootstrap/ --region "${AWS_REGION}"
            chmod +x /opt/minecraft/bootstrap/install.sh
            chmod +x /opt/minecraft/bootstrap/bin/*.sh
            log_phase userdata-bootstrap-refresh-end

            bash /opt/minecraft/bootstrap/install.sh
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: ProductName
              Value: !Ref ProductName
            - Key: Env
              Value: !Ref Env

  ###############################
  # AutoScalingGroup
  ###############################
  ### McAutoScalingGroup ### min0/max2。Discord起動でdesired=1、ハンドオーバー中だけ一時的に 2。
  ### DesiredCapacity は CFn 管理外（プロパティ未指定）にすることで、稼働中
  ### （desired=1）に CFn 更新が走っても desired=0 に強制リセットされない。
  ### 初期作成時は MinSize=0 がデフォルトの desired として採用される。
  ###
  ### MaxSize=2 の理由: スポット中断検知時に旧インスタンスの spot-watch が desired=2 にして
  ### standby を起動させ、ハンドオーバー後に旧が terminate して 1 に戻る運用のため。
  McAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub ${ProductName}-asg-${Env}
      MinSize: "0"
      MaxSize: "2"
      VPCZoneIdentifier:
        Fn::Split:
          - ","
          - Fn::ImportValue: !Sub ${ProductName}-public-subnet-ids-all
      # CapacityRebalance: false で固定。
      # 過去 true にしていたが、予兆通知で ASG が予告なくインスタンスを 44 秒程度で
      # 退役させてしまい、こちらのハンドオーバー orchestration が割り込めない問題があった
      # （standby 起動・DuckDNS 切替が間に合わず、世界保全タイミングが乱れる）。
      # 本物の中断通知（PT2M）のみを spot-watch.sh のトリガーにし、それまでは
      # AWS には介入させない設計に倒す。
      CapacityRebalance: false
      MixedInstancesPolicy:
        LaunchTemplate:
          LaunchTemplateSpecification:
            LaunchTemplateId: !Ref McLaunchTemplate
            Version: !GetAtt McLaunchTemplate.LatestVersionNumber
          # Graviton2/3 の gd 系 (NVMe instance store 付き) で 4vCPU/8GB を厳密に揃える。
          # ワールド/サーバー資産は NVMe ephemeral (/dev/nvme1n1) に配置するため、
          # メモリ過剰な m/r 系は外し、c6gd.xlarge / c7gd.xlarge の 2 候補に絞る。
          Overrides:
            - InstanceType: c6gd.xlarge
            - InstanceType: c7gd.xlarge
        InstancesDistribution:
          OnDemandBaseCapacity: 0
          OnDemandPercentageAboveBaseCapacity: 0
          # price-capacity-optimized: 容量に加えて価格も加味するため、安定した
          # (容量が厚い)プールが選ばれやすく、AWS 公式が中断率改善のため推奨。
          SpotAllocationStrategy: price-capacity-optimized
      MetricsCollection:
        - Granularity: 1Minute
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-server-${Env}
          PropagateAtLaunch: true
        - Key: ProductName
          Value: !Ref ProductName
          PropagateAtLaunch: true
        - Key: Env
          Value: !Ref Env
          PropagateAtLaunch: true

###############################
# 出力
###############################
Outputs:
  AutoScalingGroupName:
    Value: !Ref McAutoScalingGroup
    Export:
      Name: !Sub ${ProductName}-asg-name
