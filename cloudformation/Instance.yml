AWSTemplateFormatVersion: "2010-09-09"
Description: minecraft instance (LaunchTemplate / spot AutoScalingGroup)

###############################
# パラメーター
###############################
Parameters:
  Env:
    Type: String
    Description: 環境種別
  ProductName:
    Type: String
    Description: プロダクト名
  RootVolumeSize:
    Type: Number
    Default: 30
    Description: ルートEBS(gp3)サイズ(GiB)
  AwsRegion:
    Type: String
    Default: ap-northeast-1
    Description: 稼働リージョン

###############################
# リソース
###############################
Resources:
  ###############################
  # LaunchTemplate
  ###############################
  ### McLaunchTemplate ###
  McLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${ProductName}-lt-${Env}
      LaunchTemplateData:
        # AMI は img スタックの EC2 Image Builder が CFn 内で焼成した「事前焼き込み済み AMI」を使う。
        # img スタックの Outputs(PrebakedAmiId) から ImportValue で直接受け取る。
        ImageId:
          Fn::ImportValue: !Sub ${ProductName}-prebaked-ami-id
        IamInstanceProfile:
          Arn:
            Fn::ImportValue: !Sub ${ProductName}-ec2-instance-profile-arn
        SecurityGroupIds:
          - Fn::ImportValue: !Sub ${ProductName}-mc-sg-id
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSize
              VolumeType: gp3
              DeleteOnTermination: true
              Encrypted: true
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 1
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${ProductName}-server-${Env}
              - Key: ProductName
                Value: !Ref ProductName
              - Key: Env
                Value: !Ref Env
        UserData:
          Fn::Base64:
            Fn::Sub:
              - |
                #!/bin/bash
                set -euo pipefail

                # 起動時間測定ログ（CWAgent が /minecraft/startup-timing に転送する）。
                # 起動時間の最適化以外には使わない最小ログ。
                TIMING_LOG=/var/log/minecraft-startup-timing.log
                log_phase() { echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) phase=$1" >> "$TIMING_LOG"; }
                log_phase userdata-start

                # サーバー設定値を /etc/minecraft.env に書き出す（重い処理はinstall.shに委譲）
                cat <<'ENVEOF' > /etc/minecraft.env
                AWS_REGION=${AwsRegion}
                WORLD_BUCKET=${ProductName}-world-${Env}
                ASG_NAME=${ProductName}-asg-${Env}
                DUCKDNS_DOMAIN_SSM=DUCKDNS_DOMAIN
                DUCKDNS_TOKEN_SSM=DUCKDNS_TOKEN
                MC_DIR=/opt/minecraft
                RCON_PORT=25575
                RCON_PASSWORD_SSM=RCON_PASSWORD
                DISCORD_WEBHOOK_SSM=DISCORD_WEBHOOK
                ENVEOF

                # bootstrap資材（管理スクリプト/systemdユニット）をS3から取得
                mkdir -p /opt/minecraft/bootstrap
                aws s3 sync "s3://${ProductName}-world-${Env}/bootstrap/" /opt/minecraft/bootstrap/ --region "${AwsRegion}"
                log_phase bootstrap-synced

                # 実行権付与（globミスマッチでUserDataを止めない）
                chmod +x /opt/minecraft/bootstrap/install.sh /opt/minecraft/bootstrap/bin/*.sh 2>/dev/null || true

                # install.sh 不在を検知（bootstrap未同期=空のまま無言で止まるのを防ぐ）
                if [ ! -f /opt/minecraft/bootstrap/install.sh ]; then
                  echo "[minecraft-userdata] FATAL: /opt/minecraft/bootstrap/install.sh not found. bootstrap may not be synced to s3://${ProductName}-world-${Env}/bootstrap/" | tee -a /var/log/minecraft-userdata.log >&2
                  exit 1
                fi

                # セットアップ本体（依存導入・systemd配置・スクリプト最終配置・起動）を実行
                bash /opt/minecraft/bootstrap/install.sh
              - {}
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: ProductName
              Value: !Ref ProductName
            - Key: Env
              Value: !Ref Env

  ###############################
  # AutoScalingGroup
  ###############################
  ### McAutoScalingGroup ### min0/max1。Discord起動でdesired=1。
  ### DesiredCapacity は CFn 管理外（プロパティ未指定）にすることで、稼働中
  ### （desired=1）に CFn 更新が走っても desired=0 に強制リセットされない。
  ### 初期作成時は MinSize=0 がデフォルトの desired として採用される。
  McAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub ${ProductName}-asg-${Env}
      MinSize: "0"
      MaxSize: "1"
      VPCZoneIdentifier:
        Fn::Split:
          - ","
          - Fn::ImportValue: !Sub ${ProductName}-public-subnet-ids-all
      # CapacityRebalance: AWS が中断確率の上昇を検知した時点で
      # rebalance recommendation を出すよう要求する。MaxSize=1 のままでは
      # 自動で予備インスタンスを起動しないが、EventBridge 経由で予兆通知を
      # 取れるようになるため、有効化しておく。
      CapacityRebalance: true
      MixedInstancesPolicy:
        LaunchTemplate:
          LaunchTemplateSpecification:
            LaunchTemplateId: !Ref McLaunchTemplate
            Version: !GetAtt McLaunchTemplate.LatestVersionNumber
          # Graviton2/3 の 6 候補で容量プールを最大化。
          # 単一プールが枯渇しても他世代/AZ にフォールバックさせる。
          Overrides:
            - InstanceType: c6g.xlarge
            - InstanceType: m6g.xlarge
            - InstanceType: r6g.xlarge
            - InstanceType: c7g.xlarge
            - InstanceType: m7g.xlarge
            - InstanceType: r7g.xlarge
        InstancesDistribution:
          OnDemandBaseCapacity: 0
          OnDemandPercentageAboveBaseCapacity: 0
          # price-capacity-optimized: 容量に加えて価格も加味するため、安定した
          # (容量が厚い)プールが選ばれやすく、AWS 公式が中断率改善のため推奨。
          SpotAllocationStrategy: price-capacity-optimized
      MetricsCollection:
        - Granularity: 1Minute
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-server-${Env}
          PropagateAtLaunch: true
        - Key: ProductName
          Value: !Ref ProductName
          PropagateAtLaunch: true
        - Key: Env
          Value: !Ref Env
          PropagateAtLaunch: true

###############################
# 出力
###############################
Outputs:
  AutoScalingGroupName:
    Value: !Ref McAutoScalingGroup
    Export:
      Name: !Sub ${ProductName}-asg-name
