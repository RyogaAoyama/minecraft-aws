AWSTemplateFormatVersion: "2010-09-09"
Description: minecraft function (Discord interaction Lambda / alarm notify Lambda)

###############################
# パラメーター
###############################
Parameters:
  Env:
    Type: String
    Description: 環境種別
  ProductName:
    Type: String
    Description: プロダクト名

###############################
# リソース
###############################
Resources:
  ###############################
  # Discord Interaction Lambda
  ###############################
  ### DiscordInteractionFunction ### Discordスラッシュコマンドの受付（署名検証＋workerへ非同期委譲）
  ### 3秒応答制限内に deferred を返すため、重いASG処理は DiscordWorkerFunction へ非同期 invoke する。
  DiscordInteractionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProductName}-discord-interaction-${Env}
      Runtime: nodejs24.x
      Handler: index.handler
      Timeout: 10
      # package は --template-file のディレクトリ(cloudformation/)基準で相対解決するため ../src
      Code: ../src/discord-interaction
      Role:
        Fn::ImportValue: !Sub ${ProductName}-discord-lambda-role-arn
      Environment:
        Variables:
          DISCORD_PUBLIC_KEY_SSM: DISCORD_PUBLIC_KEY
          WORKER_FUNCTION_NAME: !Ref DiscordWorkerFunction
      Tags:
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### DiscordWorkerFunction ### 受付から非同期 invoke され、ASG操作 → followup でメッセージ更新を行う
  DiscordWorkerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProductName}-discord-worker-${Env}
      Runtime: nodejs24.x
      Handler: index.handler
      Timeout: 30
      MemorySize: 256
      # package は --template-file のディレクトリ(cloudformation/)基準で相対解決するため ../src
      Code: ../src/discord-worker
      Role:
        Fn::ImportValue: !Sub ${ProductName}-discord-worker-role-arn
      Environment:
        Variables:
          ASG_NAME:
            Fn::ImportValue: !Sub ${ProductName}-asg-name
      Tags:
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### DiscordInteractionFunctionUrlV2 ### Interactions Endpoint 用 Function URL
  DiscordInteractionFunctionUrlV2:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt DiscordInteractionFunction.Arn

  ### DiscordInteractionFunctionUrlPermissionV2 ### Function URL の公開呼び出し許可(InvokeFunctionUrl)
  ### 2025/10〜のAWS仕様変更により、AuthType=NONE の Function URL への public アクセスには
  ### InvokeFunctionUrl と InvokeFunction の両方の Allow(Principal:"*") が必要。下の InvokeFunction とセットで機能する。
  DiscordInteractionFunctionUrlPermissionV2:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref DiscordInteractionFunction
      Principal: "*"
      FunctionUrlAuthType: NONE

  ### DiscordInteractionFunctionInvokePermission ### Function URL public アクセスに必要(2025/10〜のAWS仕様: InvokeFunctionUrl と InvokeFunction の両方が必要)
  ### 上の InvokeFunctionUrl 用 Permission とセットで機能する。lambda:InvokeFunction では FunctionUrlAuthType は指定不可。
  DiscordInteractionFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DiscordInteractionFunction
      Principal: "*"

  ###############################
  # Alarm Notify Lambda
  ###############################
  ### AlarmNotifyFunction ### SNS/EventBridge → Discord Webhook 通知 + Spot 中断時に Advisor JSON を S3 へ永続保存
  AlarmNotifyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProductName}-alarm-notify-${Env}
      Runtime: nodejs24.x
      Handler: index.handler
      Timeout: 10
      # package は --template-file のディレクトリ(cloudformation/)基準で相対解決するため ../src
      Code: ../src/alarm-notify
      Role:
        Fn::ImportValue: !Sub ${ProductName}-alarm-notify-lambda-role-arn
      Environment:
        Variables:
          DISCORD_WEBHOOK_SSM: DISCORD_WEBHOOK
          OPS_LOGS_BUCKET:
            Fn::ImportValue: !Sub ${ProductName}-ops-logs-bucket-name
      Tags:
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### AlarmNotifySnsSubscription ### AlarmTopic → AlarmNotifyFunction
  AlarmNotifySnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: lambda
      Endpoint: !GetAtt AlarmNotifyFunction.Arn
      TopicArn:
        Fn::ImportValue: !Sub ${ProductName}-alarm-topic-arn

  ### AlarmNotifySnsPermission ### SNSからの起動許可
  AlarmNotifySnsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AlarmNotifyFunction
      Principal: sns.amazonaws.com
      SourceArn:
        Fn::ImportValue: !Sub ${ProductName}-alarm-topic-arn

  ###############################
  # EventBridge (スポット起動失敗通知)
  ###############################
  ### SpotLaunchFailureRule ### ASGの起動失敗を拾い AlarmNotifyFunction へ
  SpotLaunchFailureRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProductName}-spot-launch-failure-${Env}
      Description: notify ASG EC2 instance launch unsuccessful
      EventPattern:
        source:
          - aws.autoscaling
        detail-type:
          - EC2 Instance Launch Unsuccessful
        detail:
          AutoScalingGroupName:
            - Fn::ImportValue: !Sub ${ProductName}-asg-name
      State: ENABLED
      Targets:
        - Id: AlarmNotifyFunction
          Arn: !GetAtt AlarmNotifyFunction.Arn

  ### SpotLaunchFailurePermission ### EventBridgeからの起動許可
  SpotLaunchFailurePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AlarmNotifyFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SpotLaunchFailureRule.Arn

  ###############################
  # EventBridge (スポット中断 2分前通知)
  ###############################
  ### SpotInterruptionRule ### EC2 Spot Instance Interruption Warning を AlarmNotifyFunction で受け、S3 へ永続保存する
  SpotInterruptionRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProductName}-spot-interruption-${Env}
      Description: capture EC2 Spot Instance Interruption Warning and persist to S3
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Spot Instance Interruption Warning
      State: ENABLED
      Targets:
        - Id: AlarmNotifyFunction
          Arn: !GetAtt AlarmNotifyFunction.Arn

  ### SpotInterruptionPermission ### EventBridgeからの起動許可
  SpotInterruptionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AlarmNotifyFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SpotInterruptionRule.Arn

###############################
# 出力
###############################
Outputs:
  DiscordFunctionUrl:
    Value: !GetAtt DiscordInteractionFunctionUrlV2.FunctionUrl
    Export:
      Name: !Sub ${ProductName}-discord-function-url
