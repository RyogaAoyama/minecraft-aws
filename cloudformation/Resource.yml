AWSTemplateFormatVersion: "2010-09-09"
Description: minecraft resource (world S3 bucket / ops-logs S3 bucket / alarm SNS topic)

###############################
# パラメーター
###############################
Parameters:
  Env:
    Type: String
    Description: 環境種別
  ProductName:
    Type: String
    Description: プロダクト名
  NonCurrentVersionExpirationDays:
    Type: Number
    Default: 30
    Description: world非現行バージョンを削除するまでの日数

###############################
# リソース
###############################
Resources:
  ###############################
  # S3
  ###############################
  ### WorldBucket ### Minecraftサーバー資産(world/mods/jar等)の保管庫
  WorldBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${ProductName}-world-${Env}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: expire-noncurrent-versions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref NonCurrentVersionExpirationDays
          - Id: abort-incomplete-multipart-upload
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### OpsLogsBucket ### 運用ログ(Spot 中断ログ等)の永続保管庫。バージョニング/ライフサイクルなし
  OpsLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${ProductName}-ops-logs-${Env}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ###############################
  # SSM Parameter (handover orchestration)
  ###############################
  ### HandoverStateParam ### 旧/新インスタンス間のハンドオーバー状態フラグ
  ###   IDLE              ... 平常時
  ###   STANDBY_REQUESTED ... 旧が中断検知し新の起動を依頼した状態（新インスタンスはこれを見て自分が standby と判定する）
  ###   STANDBY_READY     ... 新が MC ready になり旧の DuckDNS 切替を待っている状態
  HandoverStateParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /minecraft/${Env}/handover-state
      Type: String
      Value: IDLE
      Description: handover orchestration state shared between active and standby instances

  ### StandbyIpParam ### 新インスタンスの public IP（DuckDNS 切替時に旧が参照する）
  ### 値は新インスタンスの install.sh が STANDBY_READY と同時に書き込む。
  StandbyIpParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /minecraft/${Env}/standby-ip
      Type: String
      Value: "0.0.0.0"
      Description: public IPv4 of the standby instance during handover (set by standby on ready)

  ###############################
  # SNS
  ###############################
  ### AlarmTopic ### CloudWatchアラーム → 通知Lambda の中継トピック
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProductName}-alarm-topic-${Env}
      Tags:
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

###############################
# 出力
###############################
Outputs:
  WorldBucketName:
    Value: !Ref WorldBucket
    Export:
      Name: !Sub ${ProductName}-world-bucket-name
  OpsLogsBucketName:
    Value: !Ref OpsLogsBucket
    Export:
      Name: !Sub ${ProductName}-ops-logs-bucket-name
  AlarmTopicArn:
    Value: !Ref AlarmTopic
    Export:
      Name: !Sub ${ProductName}-alarm-topic-arn
