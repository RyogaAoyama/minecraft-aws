AWSTemplateFormatVersion: "2010-09-09"
Description: minecraft network (VPC / IGW / public subnets / route table)

###############################
# パラメーター
###############################
Parameters:
  Env:
    Type: String
    Description: 環境種別
  ProductName:
    Type: String
    Description: プロダクト名
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: VPCのCIDRブロック
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.0.0/24
    Description: 公開Subnet(AZ-a)のCIDRブロック
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: 公開Subnet(AZ-d)のCIDRブロック
  PublicSubnet3Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: 公開Subnet(AZ-c)のCIDRブロック

###############################
# マッピング
###############################
Mappings:
  # ap-northeast-1 のマルチAZ配置（1a / 1d / 1c）。
  # !GetAZs は AZ name 昇順（1a→1c→1d）で返るため index 0=1a, 1=1c, 2=1d。
  # Spot 中断率はプール（AZ x InstanceType）単位で偏るため、3 AZ 揃えて
  # capacity-optimized が選択肢を広く取れるようにする。
  AvailabilityZone:
    Index:
      First: 0
      Second: 2
      Third: 1

###############################
# リソース
###############################
Resources:
  ###############################
  # VPC
  ###############################
  ### Vpc ###
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-vpc-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ###############################
  # InternetGateway
  ###############################
  ### InternetGateway ###
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-igw-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### InternetGatewayAttachment ###
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  ###############################
  # Subnet
  ###############################
  ### PublicSubnet1 (ap-northeast-1a) ###
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [!FindInMap [AvailabilityZone, Index, First], !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-public-subnet-1-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### PublicSubnet2 (ap-northeast-1d) ###
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [!FindInMap [AvailabilityZone, Index, Second], !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-public-subnet-2-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### PublicSubnet3 (ap-northeast-1c) ###
  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet3Cidr
      AvailabilityZone: !Select [!FindInMap [AvailabilityZone, Index, Third], !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-public-subnet-3-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ###############################
  # RouteTable
  ###############################
  ### PublicRouteTable ###
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-public-rt-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### PublicDefaultRoute ###
  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  ### PublicSubnet1RouteTableAssociation ###
  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  ### PublicSubnet2RouteTableAssociation ###
  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  ### PublicSubnet3RouteTableAssociation ###
  PublicSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet3

###############################
# 出力
###############################
Outputs:
  VpcId:
    Value: !Ref Vpc
    Export:
      Name: !Sub ${ProductName}-vpc-id
  # 旧 Export(2サブネット）。CFn は Import 中の Export 値を変更できないため、
  # 既存の minecraft-ins-prd が参照している間は値を変えず保持する。
  # 新規参照は下の PublicSubnetIdsAll を使う。
  # 将来 ins から参照が外れたら、本 Export ごと削除して整理する。
  PublicSubnetIds:
    Value: !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2]]
    Export:
      Name: !Sub ${ProductName}-public-subnet-ids
  # 新 Export(3サブネット)。ASG の VPCZoneIdentifier はこちらを参照する。
  PublicSubnetIdsAll:
    Value: !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2, !Ref PublicSubnet3]]
    Export:
      Name: !Sub ${ProductName}-public-subnet-ids-all
