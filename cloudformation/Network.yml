AWSTemplateFormatVersion: "2010-09-09"
Description: minecraft network (VPC / IGW / public subnets / route table)

###############################
# パラメーター
###############################
Parameters:
  Env:
    Type: String
    Description: 環境種別
  ProductName:
    Type: String
    Description: プロダクト名
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: VPCのCIDRブロック
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.0.0/24
    Description: 公開Subnet(AZ-a)のCIDRブロック
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: 公開Subnet(AZ-c)のCIDRブロック

###############################
# マッピング
###############################
Mappings:
  # ap-northeast-1 のマルチAZ配置（1a / 1c）
  AvailabilityZone:
    Index:
      First: 0
      Second: 2

###############################
# リソース
###############################
Resources:
  ###############################
  # VPC
  ###############################
  ### Vpc ###
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-vpc-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ###############################
  # InternetGateway
  ###############################
  ### InternetGateway ###
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-igw-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### InternetGatewayAttachment ###
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  ###############################
  # Subnet
  ###############################
  ### PublicSubnet1 (ap-northeast-1a) ###
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [!FindInMap [AvailabilityZone, Index, First], !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-public-subnet-1-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### PublicSubnet2 (ap-northeast-1c) ###
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [!FindInMap [AvailabilityZone, Index, Second], !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-public-subnet-2-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ###############################
  # RouteTable
  ###############################
  ### PublicRouteTable ###
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProductName}-public-rt-${Env}
        - Key: ProductName
          Value: !Ref ProductName
        - Key: Env
          Value: !Ref Env

  ### PublicDefaultRoute ###
  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  ### PublicSubnet1RouteTableAssociation ###
  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  ### PublicSubnet2RouteTableAssociation ###
  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

###############################
# 出力
###############################
Outputs:
  VpcId:
    Value: !Ref Vpc
    Export:
      Name: !Sub ${ProductName}-vpc-id
  PublicSubnetIds:
    Value: !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2]]
    Export:
      Name: !Sub ${ProductName}-public-subnet-ids
