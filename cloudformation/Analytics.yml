AWSTemplateFormatVersion: "2010-09-09"
Description: minecraft analytics (Glue Database + tables for S3+Athena metrics)

###############################
# パラメーター
###############################
Parameters:
  Env:
    Type: String
    Description: 環境種別
  ProductName:
    Type: String
    Description: プロダクト名

###############################
# リソース
###############################
# Phase 1-2 で Glue Database + metrics_{gc, iostat, node_snapshot} を作成する。
# 他テーブル (save_sync / startup / spot_interruption) は Phase 3-4 で追加する。
#
# Partition Projection で Glue Crawler 不要にしている。CFn の !Sub 内で
# Glue 側の変数 ${year} などをそのまま書くと CFn が解決しようとして失敗するため、
# `${!year}` の形でエスケープしている。
Resources:
  ###############################
  # Glue Database
  ###############################
  MetricsDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub ${ProductName}_metrics
        Description: S3-based metrics for minecraft server (Athena via Partition Projection)

  ###############################
  # Table: metrics_gc (JVM JFR の jdk.GarbageCollection + jdk.GCHeapSummary を join した JSONL)
  ###############################
  GcTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref MetricsDatabase
      TableInput:
        Name: gc
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          projection.enabled: "true"
          projection.year.type: integer
          projection.year.range: 2026,2030
          projection.month.type: integer
          projection.month.range: 1,12
          projection.month.digits: "2"
          projection.day.type: integer
          projection.day.range: 1,31
          projection.day.digits: "2"
          projection.hour.type: integer
          projection.hour.range: 0,23
          projection.hour.digits: "2"
          projection.instance.type: injected
          storage.location.template: !Sub s3://${ProductName}-ops-logs-${Env}/metrics/gc/year=${!year}/month=${!month}/day=${!day}/hour=${!hour}/instance=${!instance}/
        PartitionKeys:
          - {Name: year, Type: int}
          - {Name: month, Type: int}
          - {Name: day, Type: int}
          - {Name: hour, Type: int}
          - {Name: instance, Type: string}
        StorageDescriptor:
          Location: !Sub s3://${ProductName}-ops-logs-${Env}/metrics/gc/
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
          Columns:
            # ts: JFR startTime を unix epoch 秒文字列にしたもの (Athena 側で from_unixtime しやすい)。
            # start_time: JFR の元の startTime 文字列 (ISO 8601 timestamp or epoch ns) を保存。
            # gc_id: jdk.GarbageCollection.gcId。GCHeapSummary を join する際のキー。
            # name: ZGC の "ZGC Major" / "ZGC Minor" などイベント名 (JDK 公式分類)。
            # cause: GC 発生要因 (例: "Metadata GC Threshold" / "Allocation Rate" / "System.gc()")。
            # duration_ms: jdk.GarbageCollection.duration をミリ秒に正規化。
            # heap_before_mb / heap_after_mb: gcId が同じ GCHeapSummary の when=Before/After GC の heapUsed を MiB 化。
            - {Name: ts, Type: string}
            - {Name: start_time, Type: string}
            - {Name: gc_id, Type: int}
            - {Name: name, Type: string}
            - {Name: cause, Type: string}
            - {Name: duration_ms, Type: double}
            - {Name: heap_before_mb, Type: double}
            - {Name: heap_after_mb, Type: double}

  ###############################
  # Table: metrics_iostat (per-device NVMe I/O snapshot, 60s)
  ###############################
  IostatTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref MetricsDatabase
      TableInput:
        Name: iostat
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          projection.enabled: "true"
          projection.year.type: integer
          projection.year.range: 2026,2030
          projection.month.type: integer
          projection.month.range: 1,12
          projection.month.digits: "2"
          projection.day.type: integer
          projection.day.range: 1,31
          projection.day.digits: "2"
          projection.hour.type: integer
          projection.hour.range: 0,23
          projection.hour.digits: "2"
          projection.instance.type: injected
          storage.location.template: !Sub s3://${ProductName}-ops-logs-${Env}/metrics/iostat/year=${!year}/month=${!month}/day=${!day}/hour=${!hour}/instance=${!instance}/
        PartitionKeys:
          - {Name: year, Type: int}
          - {Name: month, Type: int}
          - {Name: day, Type: int}
          - {Name: hour, Type: int}
          - {Name: instance, Type: string}
        StorageDescriptor:
          Location: !Sub s3://${ProductName}-ops-logs-${Env}/metrics/iostat/
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
          Columns:
            - {Name: ts, Type: string}
            - {Name: dev, Type: string}
            - {Name: r_iops, Type: double}
            - {Name: w_iops, Type: double}
            - {Name: r_kbps, Type: double}
            - {Name: w_kbps, Type: double}
            - {Name: r_await, Type: double}
            - {Name: w_await, Type: double}
            - {Name: queue, Type: double}
            - {Name: util, Type: double}

  ###############################
  # Table: metrics_node_snapshot (proc + RCON + Spark health, 60s)
  ###############################
  NodeSnapshotTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref MetricsDatabase
      TableInput:
        Name: node_snapshot
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: json
          projection.enabled: "true"
          projection.year.type: integer
          projection.year.range: 2026,2030
          projection.month.type: integer
          projection.month.range: 1,12
          projection.month.digits: "2"
          projection.day.type: integer
          projection.day.range: 1,31
          projection.day.digits: "2"
          projection.hour.type: integer
          projection.hour.range: 0,23
          projection.hour.digits: "2"
          projection.instance.type: injected
          storage.location.template: !Sub s3://${ProductName}-ops-logs-${Env}/metrics/node_snapshot/year=${!year}/month=${!month}/day=${!day}/hour=${!hour}/instance=${!instance}/
        PartitionKeys:
          - {Name: year, Type: int}
          - {Name: month, Type: int}
          - {Name: day, Type: int}
          - {Name: hour, Type: int}
          - {Name: instance, Type: string}
        StorageDescriptor:
          Location: !Sub s3://${ProductName}-ops-logs-${Env}/metrics/node_snapshot/
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
          Columns:
            - {Name: ts, Type: string}
            - {Name: rss_kb, Type: bigint}
            - {Name: cpu_percent, Type: double}
            - {Name: mem_avail_kb, Type: bigint}
            - {Name: load_1m, Type: double}
            - {Name: players, Type: int}
            - {Name: tps_1m, Type: double}
            - {Name: mspt_1m, Type: double}
            - {Name: heap_used_mb, Type: double}

###############################
# 出力
###############################
Outputs:
  MetricsDatabaseName:
    Value: !Ref MetricsDatabase
    Export:
      Name: !Sub ${ProductName}-metrics-database-name
