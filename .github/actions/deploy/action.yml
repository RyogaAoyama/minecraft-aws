name: deploy

description:
  OIDC で AWS に認証し、CloudFormation スタックと bootstrap 同期をデプロイする。

inputs:
  iam_arn:
    description: assume する IAM ロール ARN
    required: true
  env:
    description: デプロイ環境（prd）
    required: true

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
      with:
        role-to-assume: ${{ inputs.iam_arn }}
        role-session-name: github-actions-minecraft
        aws-region: ap-northeast-1

    - name: Set named credentials
      shell: bash
      run: |
        aws configure set aws_access_key_id ${AWS_ACCESS_KEY_ID} --profile default
        aws configure set aws_secret_access_key ${AWS_SECRET_ACCESS_KEY} --profile default
        aws configure set aws_session_token ${AWS_SESSION_TOKEN} --profile default
        aws configure set aws_region ${AWS_REGION} --profile default

    - name: Ensure deploy bucket
      shell: bash
      run: |
        aws s3api head-bucket --bucket minecraft-deploy-prd --profile default 2>/dev/null \
          || aws s3api create-bucket --bucket minecraft-deploy-prd --profile default \
               --region ap-northeast-1 \
               --create-bucket-configuration LocationConstraint=ap-northeast-1

    - name: CloudFormation deploy
      shell: bash
      run: ./sh/deploy-cfn-all.sh -e ${{ inputs.env }} -p default

    # Fabric サーバー一式を Java 不要・純ダウンロードで組み立てる（ランチャー curl + mods --frozen）。
    # vanilla server / libraries はインスタンス初回起動時にランチャーが自動DLするため CI には不要。
    - name: Build Fabric server (no Java)
      shell: bash
      run: ./sh/build-server.sh --frozen -o ./my-fabric-server

    # world/ へアップロード。--delete は付けない（world/ にはセーブデータが同居するため）。
    # バイナリ/MOD のみ上書き同期する。
    - name: Upload server assets to world/
      shell: bash
      run: |
        aws s3 sync ./my-fabric-server/ s3://minecraft-world-prd/world/ \
          --region ap-northeast-1

    - name: Sync bootstrap
      shell: bash
      run: ./sh/sync-bootstrap.sh -p default
