name: deploy

on:
  push:
    branches:
      - main
    paths:
      - cloudformation/**
      - sh/**
      - src/**
      - server/**
      - mods.txt
      - mods.lock
      - server.lock
      - .github/workflows/**
      - .github/actions/**

permissions:
  contents: read

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}" >> $GITHUB_ENV
      - name: deploy start notification
        uses: ./.github/actions/discord-notice
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          username: ${{ env.REPOSITORY_NAME }}
          content: 🚀 ${{ env.REPOSITORY_NAME }} (main) のデプロイを開始します

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: deploy
        uses: ./.github/actions/deploy
        with:
          iam_arn: ${{ secrets.DEPLOY_IAM_ROLE_ARN }}
          env: prd

  notify-success:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ success() }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}" >> $GITHUB_ENV
      - name: deploy success notification
        uses: ./.github/actions/discord-notice
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          username: ${{ env.REPOSITORY_NAME }}
          content: ✅ ${{ env.REPOSITORY_NAME }} のデプロイに成功しました

  notify-error:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ failure() }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}" >> $GITHUB_ENV
      - name: deploy error notification
        uses: ./.github/actions/discord-notice
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          username: ${{ env.REPOSITORY_NAME }}
          content: |
            ❌ ${{ env.REPOSITORY_NAME }} のデプロイに失敗しました
            ログ: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
