name: build-ami

# Minecraft サーバー用のカスタム AMI を焼成し、SSM Parameter /minecraft/prd/ami-id を更新する。
# Instance.yml の AmiId がこの SSM Parameter を参照する設計（別コミットで切替予定）。
#
# 実行タイミング:
#   - workflow_dispatch: 手動実行（初回ビルド・即時更新）
#   - schedule: 月初 03:00 JST に自動再焼成（AL2023 のセキュリティパッチ追従）
on:
  workflow_dispatch:
  schedule:
    # 毎月 1 日 18:00 UTC = 03:00 JST 翌日
    - cron: "0 18 1 * *"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.DEPLOY_IAM_ROLE_ARN }}
          role-session-name: github-actions-minecraft-ami
          aws-region: ap-northeast-1

      - name: Build AMI
        shell: bash
        run: bash ./sh/build-ami.sh

  notify-success:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ success() }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}" >> $GITHUB_ENV
      - name: notify
        uses: ./.github/actions/discord-notice
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          username: ${{ env.REPOSITORY_NAME }}
          content: ✅ ${{ env.REPOSITORY_NAME }} のカスタム AMI 焼成が完了しました

  notify-failure:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ failure() }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}" >> $GITHUB_ENV
      - name: notify
        uses: ./.github/actions/discord-notice
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          username: ${{ env.REPOSITORY_NAME }}
          content: |
            ❌ ${{ env.REPOSITORY_NAME }} のカスタム AMI 焼成に失敗しました
            ログ: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
